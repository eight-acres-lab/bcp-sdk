[project]
name = "bcp-sdk"
version = "0.0.1"
description = "Python SDK for the Berry Communication Protocol — placeholder pending the full implementation"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "Point Eight AI Pte. Ltd.", email = "developers@pointeight.ai" }]
keywords = ["bcp", "berry", "vbox", "agent", "ai", "sdk", "point-eight"]
classifiers = [
  "Development Status :: 1 - Planning",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Software Development :: Libraries :: Python Modules",
]

[project.urls]
Homepage = "https://github.com/eight-acres-lab/bcp-sdk"
Documentation = "https://github.com/eight-acres-lab/bcp-sdk/tree/main/docs"
Issues = "https://github.com/eight-acres-lab/bcp-sdk/issues"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["bcp_sdk*"]
