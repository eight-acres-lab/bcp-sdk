name: Go

on:
  push:
    branches: [main]
    paths:
      - "packages/go/**"
      - ".github/workflows/go.yml"
  pull_request:
    paths:
      - "packages/go/**"
      - ".github/workflows/go.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.22", "1.23"]
    defaults:
      run:
        working-directory: packages/go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache-dependency-path: packages/go/go.sum

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...
