name: Python

on:
  push:
    branches: [main]
    paths:
      - "packages/python/**"
      - ".github/workflows/python.yml"
  pull_request:
    paths:
      - "packages/python/**"
      - ".github/workflows/python.yml"

# Placeholder workflow. The Python SDK is a stub today — this job exercises
# the package skeleton (build, install, import) so the placeholder does not
# silently rot while the implementation lands.

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.10", "3.11", "3.12"]
    defaults:
      run:
        working-directory: packages/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install
        run: pip install -e .

      - name: Import smoke test
        run: python -c "import bcp_sdk; assert bcp_sdk.__status__ == 'planning'; print('ok', bcp_sdk.__version__)"
